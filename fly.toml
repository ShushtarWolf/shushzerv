# Fly.io demo deployment — https://fly.io/docs/reference/configuration/

app = 'in-box-s-demo'
primary_region = 'fra'

[build]

[env]
  NODE_ENV = 'production'
  HOST = '0.0.0.0'
  PORT = '8080'
  DATABASE_URL = 'file:/data/dev.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '120s'
    method = 'GET'
    path = '/'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '1gb'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

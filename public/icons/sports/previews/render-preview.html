<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui; background: #f5f5f5; padding: 32px; margin: 0; }
    .row { display: flex; gap: 24px; flex-wrap: wrap; }
    .card { background: #fff; border-radius: 16px; padding: 24px; text-align: center; width: 200px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .card h2 { margin: 0 0 8px; font-size: 15px; }
    .card p { margin: 0 0 16px; font-size: 12px; color: #666; }
    .icon-wrap { width: 120px; height: 120px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; border-radius: 16px; background: #FF6B0022; }
    .icon-wrap svg { width: 80px; height: 80px; color: #FF6B00; }
    .hero { background: #FF6B00; border-radius: 16px; padding: 16px; margin-top: 12px; }
    .hero svg { width: 56px; height: 56px; color: #fff; }
  </style>
</head>
<body>
  <h1>Basketball icons — pick A, B, or C</h1>
  <div class="row">
    <div class="card">
      <h2>A · Classic Seam</h2>
      <p>Clean line-art ball</p>
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="17.5" stroke="currentColor" stroke-width="2.25"/><path d="M24 6.5v35" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M6.5 24h35" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M9.2 14.8c7.8 5.2 21.8 5.2 29.6 0" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M9.2 33.2c7.8-5.2 21.8-5.2 29.6 0" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
      </div>
      <div class="hero"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="17.5" stroke="currentColor" stroke-width="2.25"/><path d="M24 6.5v35" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M6.5 24h35" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M9.2 14.8c7.8 5.2 21.8 5.2 29.6 0" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M9.2 33.2c7.8-5.2 21.8-5.2 29.6 0" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg></div>
    </div>
    <div class="card">
      <h2>B · Hoop Shot</h2>
      <p>Ball above rim & net</p>
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" fill="none"><path d="M7 34.5h34" stroke="currentColor" stroke-width="2.75" stroke-linecap="round"/><path d="M11 34.5v5.5M16 34.5v7.5M21 34.5v9M26 34.5v9M31 34.5v7.5M36 34.5v5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/><circle cx="24" cy="14.5" r="11" stroke="currentColor" stroke-width="2.5"/><path d="M24 4v21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M13.5 14.5h21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14.2 9.2c5.2 3.8 14.4 3.8 19.6 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14.2 19.8c5.2-3.8 14.4-3.8 19.6 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M18 28.5c2 2.5 4.5 3.8 6 3.8s4-1.3 6-3.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/></svg>
      </div>
      <div class="hero"><svg viewBox="0 0 48 48" fill="none"><path d="M7 34.5h34" stroke="currentColor" stroke-width="2.75" stroke-linecap="round"/><path d="M11 34.5v5.5M16 34.5v7.5M21 34.5v9M26 34.5v9M31 34.5v7.5M36 34.5v5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/><circle cx="24" cy="14.5" r="11" stroke="currentColor" stroke-width="2.5"/><path d="M24 4v21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M13.5 14.5h21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14.2 9.2c5.2 3.8 14.4 3.8 19.6 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14.2 19.8c5.2-3.8 14.4-3.8 19.6 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M18 28.5c2 2.5 4.5 3.8 6 3.8s4-1.3 6-3.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/></svg></div>
    </div>
    <div class="card">
      <h2>C · Motion</h2>
      <p>Ball mid-dribble</p>
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="31" cy="29" r="10.5" stroke="currentColor" stroke-width="2.5"/><path d="M31 18.5v21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M20.5 29h21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M21.2 23.8c4.8 3.2 13.8 3.2 18.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M21.2 34.2c4.8-3.2 13.8-3.2 18.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 38.5c5-14 12-18.5 20-18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="3.5 3"/><path d="M8 41h10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/><circle cx="11" cy="38.5" r="2" fill="currentColor" opacity="0.35"/></svg>
      </div>
      <div class="hero"><svg viewBox="0 0 48 48" fill="none"><circle cx="31" cy="29" r="10.5" stroke="currentColor" stroke-width="2.5"/><path d="M31 18.5v21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M20.5 29h21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M21.2 23.8c4.8 3.2 13.8 3.2 18.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M21.2 34.2c4.8-3.2 13.8-3.2 18.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 38.5c5-14 12-18.5 20-18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="3.5 3"/><path d="M8 41h10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/><circle cx="11" cy="38.5" r="2" fill="currentColor" opacity="0.35"/></svg></div>
    </div>
  </div>
</body>
</html>

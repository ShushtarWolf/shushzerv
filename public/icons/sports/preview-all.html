<!DOCTYPE html>

<head>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    h1 { font-size: 22px; margin-bottom: 6px; }
    p { color: #666; font-size: 14px; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 920px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.07); }
    .icon-box { width: 88px; height: 88px; margin: 0 auto 12px; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: var(--c); }
    .icon-box svg { width: 56px; height: 56px; }
    .name { font-weight: 800; font-size: 14px; }
    .slug { font-size: 11px; color: #999; margin-top: 2px; }
  </style>
</head>
